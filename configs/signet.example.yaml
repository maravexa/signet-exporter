# signet-exporter — full annotated example configuration
# All duration values accept Go duration strings (e.g. 30s, 1m, 2h).
#
# Hot-reloadable via SIGHUP (no restart needed):
#   subnets.*  — add/remove subnets, change scan intervals, ports, allowlist paths
#
# Requires restart to take effect:
#   listen_address, tls.*, dns.*, scanner.*, state.*, oui_database, audit.*

# Address and port on which the /metrics endpoint will be served.
# NEVER bind to 0.0.0.0 in production; restrict to a management interface.
listen_address: "127.0.0.1:9420"

# TLS configuration for the /metrics endpoint.
# Leave cert_file and key_file empty to run without TLS (not recommended in production).
# Uncomment TLS section to enable TLS (strongly RECOMMENDED in production).
# Run: signet-exporter --generate-certs /etc/signet/tls  to create a dev cert chain.
#tls:
  #cert_file: "/etc/signet/tls/server.pem"
  #key_file: "/etc/signet/tls/server-key.pem"
  # Enable mTLS — only Prometheus scrapers presenting a cert signed by this CA
  # will be permitted to reach /metrics. Requires cert_file + key_file above.
  #client_ca_file: "/etc/signet/tls/ca.pem"
  # Client certificate enforcement policy. Only takes effect when client_ca_file is set.
  #   require_and_verify  — client cert is mandatory and must be CA-signed (default)
  #   verify_if_given     — verify the cert if presented, but don't require one
  #   no_client_cert      — do not request a client cert (disables mTLS)
  #client_auth_policy: "require_and_verify"
  # Minimum TLS version. Supported values: "1.2", "1.3". Default: "1.3".
  #min_version: "1.3"

# One or more network subnets to scan. Each subnet may have independent settings.
subnets:
  - cidr: "10.0.1.0/24"
    # How often to run a full scan of this subnet.
    scan_interval: 60s
    # TCP ports to probe on each discovered host.
    ports: [22, 80, 443, 3389, 8080, 8443]
    # Path to a newline-delimited file of authorized MAC addresses (one per line,
    # colon-separated, e.g. "aa:bb:cc:dd:ee:ff"). Devices not in this list will
    # trigger signet_unauthorized_device_detected = 1.
    #mac_allowlist_file: "/etc/signet/allowlists/10.0.1.allowlist"

  - cidr: "10.0.2.0/24"
    scan_interval: 5m
    ports: [22, 443]
    mac_allowlist_file: ""

# DNS probe settings for forward/reverse consistency checking.
dns:
  # Explicit resolver addresses (host:port). Leave empty to use system resolvers.
  servers:
    - "10.0.0.1:53"
    - "10.0.0.2:53"
  # Per-query DNS timeout.
  timeout: 2s

# Global scanner concurrency and per-probe timeout settings.
scanner:
  # Maximum number of subnet scans that may run in parallel across all subnets.
  max_parallel_scans: 4
  # Timeout for each ICMP echo request.
  icmp_timeout: 1s
  # Timeout for each ARP request.
  arp_timeout: 2s
  # Timeout for each TCP connect probe.
  port_timeout: 1s

# State persistence backend.
state:
  # "memory" — non-persistent; all host state is lost on restart (default).
  # "bolt"   — persistent bbolt database; state survives restarts.
  #            Required for continuous MAC-IP binding history and compliance audit trails.
  backend: "memory"
  # bolt_path: "/var/lib/signet/state.db"   # database file (bolt backend only)
  #
  # Maintenance: compact the database when it grows after many MAC-IP binding
  # changes. The exporter must be stopped before running compaction:
  #   signet-exporter --compact-db /var/lib/signet/state.db

# Path to the IEEE OUI vendor database snapshot (ieee-oui.txt format).
# Download from: https://standards-oui.ieee.org/oui/oui.txt
oui_database: "/usr/share/signet/oui.txt"

# Structured audit log settings.
audit:
  enabled: true
  # Output format: "json" (default, one JSON object per line) or "cef" (Common Event
  # Format for SIEM integration, e.g. Splunk, QRadar, ArcSight).
  format: "json"
  # Where to write audit records:
  #   "stderr"  — standard error (default)
  #   "stdout"  — standard output
  #   "file"    — append to the file at path (see below)
  output: "file"
  # File path, used when output is "file". Parent directory must exist.
  path: "/var/log/signet/audit.log"

# -----------------------------------------------------------------------------
# Prometheus remote write (Phase 6) — push metrics to Mimir / Cortex /
# Thanos receive / Grafana Cloud / any v1 remote-write-compatible endpoint.
#
# Disabled by default. Enabling does NOT replace the /metrics scrape endpoint;
# both can coexist. Setting `enabled: true` is the only thing required to flip
# on a working pipeline assuming `endpoint` and `auth` are correctly populated.
#
# Hot-reloadable via SIGHUP (no restart needed):
#   endpoint, interval, timeout, queue, auth credentials, external_labels
# Requires restart to take effect:
#   enabled (true ↔ false)
# -----------------------------------------------------------------------------
remote_write:
  enabled: false
  # Receiver URL. Scheme must be http or https. Single endpoint per Signet
  # instance — multi-endpoint fan-out is deferred to v0.7.0.
  endpoint: "https://mimir.example.internal/api/v1/push"
  # How often to gather metrics and enqueue a push batch.
  interval: 60s
  # Per-request timeout. Must be < interval.
  timeout: 30s

  # In-memory bounded FIFO. On overflow the oldest enqueued batch is dropped
  # and the count is incremented on signet_remote_write_samples_dropped_total.
  queue:
    max_samples: 50000
    overflow: "drop_oldest"   # only supported value in v0.6.0

  # Authentication. mTLS is the default — best for compliance-heavy and
  # air-gapped environments. Bearer-token and HTTP basic are supported as
  # alternatives; use auth.type to select.
  auth:
    type: "mtls"   # "mtls" | "bearer" | "basic" | "none"

    # mTLS — the default. The receiver presents a server cert verified
    # against ca_cert_file; Signet presents client_cert_file/client_key_file.
    # The same keypair generated by `signet-exporter --generate-certs` works
    # for both inbound mTLS scrape and outbound mTLS push.
    ca_cert_file: "/etc/signet/tls/ca.pem"
    client_cert_file: "/etc/signet/tls/client.pem"
    client_key_file: "/etc/signet/tls/client-key.pem"

    # Bearer token authentication (e.g. Grafana Cloud).
    # Uncomment, set type: "bearer", and supply a path containing the token.
    # The file is re-read on SIGHUP so token rotation does not require restart.
    #bearer_token_file: "/etc/signet/grafana-cloud-token"

    # HTTP basic authentication.
    # Uncomment, set type: "basic", and supply username + password file.
    #basic_username: "signet"
    #basic_password_file: "/etc/signet/remote-write-password"

  # External labels stamped onto every series. Operators must explicitly
  # populate this — Signet applies NO defaults. Collisions with existing
  # series labels are conversion errors, not silent overrides.
  # Common examples:
  external_labels:
    cluster: "edge-dc1"
    region: "us-west-2"
    instance: "signet-01"
