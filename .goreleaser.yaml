version: 2

project_name: signet-exporter

before:
  hooks:
    - go mod tidy

builds:
  # Standard build — linux amd64 and arm64.
  - id: standard
    main: ./cmd/signet-exporter
    binary: signet-exporter
    goos: [linux]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/maravexa/signet-exporter/internal/version.Version={{.Version}}
      - -X github.com/maravexa/signet-exporter/internal/version.Commit={{.Commit}}
      - -X github.com/maravexa/signet-exporter/internal/version.Date={{.Date}}

  # FIPS build — linux amd64 only, compiled with BoringCrypto.
  - id: fips
    main: ./cmd/signet-exporter
    binary: signet-exporter-fips
    goos: [linux]
    goarch: [amd64]
    env:
      - CGO_ENABLED=0
      - GOEXPERIMENT=boringcrypto
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/maravexa/signet-exporter/internal/version.Version={{.Version}}-fips
      - -X github.com/maravexa/signet-exporter/internal/version.Commit={{.Commit}}
      - -X github.com/maravexa/signet-exporter/internal/version.Date={{.Date}}

archives:
  - id: standard
    builds: [standard]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    files:
      - LICENSE
      - README.md
      - configs/signet.example.yaml
      - grafana/signet-overview.json
      - grafana/README.md

  - id: fips
    builds: [fips]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}_fips"
    format: tar.gz
    files:
      - LICENSE
      - README.md

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: maravexa
    name: signet-exporter
  draft: false
  prerelease: auto

nfpms:
  - id: signet-exporter
    package_name: signet-exporter
    builds: [standard]
    vendor: Mara Vexa
    homepage: https://github.com/maravexa/signet-exporter
    maintainer: Mara Vexa <mara@maravexa.com>
    description: >-
      Prometheus exporter for network inventory observability. Subnet scanning,
      ARP-based duplicate detection, MAC-IP binding stability, DNS consistency,
      and rogue device detection. Designed for air-gapped and compliance-heavy
      environments.
    license: MIT
    section: net
    priority: optional

    formats:
      - deb
      - rpm
      - archlinux

    # Package dependencies — deb default; overridden per-format below
    dependencies:
      - libcap2-bin   # provides setcap, needed by postinstall

    overrides:
      rpm:
        dependencies:
          - libcap
      archlinux:
        dependencies:
          - libcap

    # Files to include in the package beyond the binary
    contents:
      # Default config file — marked as conffile so package managers preserve operator edits on upgrade
      - src: configs/signet.example.yaml
        dst: /etc/signet/signet.yaml
        type: config
        file_info:
          mode: 0644
          owner: root
          group: signet

      # systemd unit
      - src: deploy/signet-exporter.service
        dst: /usr/lib/systemd/system/signet-exporter.service
        file_info:
          mode: 0644

      # sysusers.d — declarative user creation
      - src: deploy/signet-exporter.sysusers
        dst: /usr/lib/sysusers.d/signet-exporter.conf
        file_info:
          mode: 0644

      # OUI database stub (operator should run update-oui.sh for full database)
      - src: data/oui.txt
        dst: /usr/share/signet/oui.txt
        file_info:
          mode: 0644
          owner: signet
          group: signet

      # OUI update helper script
      - src: scripts/update-oui.sh
        dst: /usr/lib/signet/update-oui.sh
        file_info:
          mode: 0755

      # State directory
      - dst: /var/lib/signet
        type: dir
        file_info:
          mode: 0750
          owner: signet
          group: signet
      
      # Audit log directory
      - dst: /var/log/signet
        type: dir
        file_info:
          mode: 0750
          owner: signet
          group: signet

      # Allowlist directory
      - dst: /etc/signet/allowlists
        type: dir
        file_info:
          mode: 0750
          owner: root
          group: signet

      # TLS certificate directory
      - dst: /etc/signet/tls
        type: dir
        file_info:
          mode: 0750
          owner: root
          group: signet

    scripts:
      postinstall: scripts/postinstall.sh
      preremove: scripts/preremove.sh

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
